<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ChordChart" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>ChordChart Fast</title>
</head>
<body class="mode-text">
  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="brand">ChordChart <span>Fast</span></div>
      <div class="segmented" aria-label="Entry mode">
        <button id="textModeBtn" class="mode-btn active">Text</button>
        <button id="chordModeBtn" class="mode-btn">Chord</button>
      </div>
      <button id="menuBtn" class="icon-btn" aria-label="Project menu">•••</button>
    </header>

    <section id="projectDrawer" class="project-drawer hidden">
      <label class="field"><span>Song name</span><input id="projectName" type="text" placeholder="Untitled" autocomplete="off" /></label>
      <label class="field"><span>Open saved song</span><select id="projectSelect"><option value="">Current song</option></select></label>
      <div class="drawer-actions">
        <button id="newProjectBtn">New</button>
        <button id="importBtn">Import</button>
        <input id="importInput" type="file" accept="text/plain,.txt" hidden />
        <button id="saveTxtBtn" class="primary">Save TXT</button>
        <button id="downloadBackupBtn">Backup TXT</button>
      </div>
      <input id="backupFolderInput" type="hidden" />
      <button id="chooseBackupFolderBtn" hidden></button><button id="clearBackupFolderBtn" hidden></button><small id="backupFolderHelp" hidden></small>
      <div class="drawer-status"><span id="saveStatus">Saved locally</span><span id="backupStatus">Private /backups autosave every 60 seconds.</span></div>
    </section>

    <main class="workspace">
      <section class="editor-panel">
        <div class="editor-head">
          <span id="editorModeBadge" class="editor-mode-badge">TEXT MODE</span>
          <span id="modeLabel" class="sr-only">TEXT</span><span id="modeHint" class="editor-hint">Tap Text to type</span>
          <div class="editor-actions">
            <button data-editor-action="undo" class="mini">↶</button>
            <button data-editor-action="redo" class="mini">↷</button>
            <button data-editor-action="copy" class="mini">Copy</button>
          </div>
        </div>
        <textarea id="chartEditor" spellcheck="false" aria-label="Chord chart editor" placeholder="Verse 1&#10;Em  G | D  C |"></textarea>
        <div class="editor-foot"><span id="charCount">0 characters</span></div>
      </section>

      <aside id="chordPanel" class="chord-panel disabled">
        <div class="builder-head">
          <div class="preview-block"><span>Current</span><strong id="chordPreview">—</strong></div>
          <div class="scale-row">
            <div class="key-picker-wrap">
              <button id="keyScaleBtn" class="compact-btn" aria-expanded="false">C / Am</button>
              <div id="keyScalePopover" class="key-scale-popover hidden"><div id="keyGrid" class="key-grid"></div></div>
            </div>
            <select id="scaleType" aria-label="Scale type"><option value="major">Major</option><option value="naturalMinor">Natural minor</option><option value="harmonicMinor">Harmonic minor</option><option value="melodicMinor">Melodic minor</option></select>
          </div>
          <div class="builder-actions"><button id="clearChordBtn">Clear</button><button id="insertChordBtn" class="primary">Insert</button></div>
        </div>

        <div class="controls-scroll">
          <section class="touch-section priority utilities-section">
            <h2>Utilities</h2>
            <div id="utilitiesLine" class="utility-line">
              <button id="mobileBarBtn">|</button>
              <button id="mobileNewLineBtn">↵</button>
              <button id="mobileBeatBtn">'</button>
              <button class="utility-btn" data-utility="tripleQuote">'''</button>
              <button class="utility-btn" data-utility="time" data-value="2/4">2/4</button>
              <button class="utility-btn" data-utility="time" data-value="4/4">4/4</button>
              <button class="utility-btn" data-utility="repeat" data-value="2">X2</button>
              <button class="utility-btn" data-utility="repeat" data-value="4">X4</button>
              <button id="mobileDoubleBtn">||</button>
              <button id="mobileRepeatBtn">:||</button>
              <button id="mobileSyncBtn">*</button>
              <button class="utility-btn" data-utility="repeat" data-value="3">X3</button>
              <button class="utility-btn" data-utility="time" data-value="3/4">3/4</button>
              <button class="utility-btn" data-utility="time" data-value="5/4">5/4</button>
              <button class="utility-btn" data-utility="time" data-value="3/8">3/8</button>
              <button class="utility-btn" data-utility="time" data-value="6/8">6/8</button>
            </div>
          </section>

          <section class="touch-section priority">
            <div class="section-row"><h2>Diatonic</h2><label class="toggle-label"><input id="seventhToggle" type="checkbox" />7ths</label></div>
            <div id="diatonicGrid" class="diatonic-grid-mobile"></div>
          </section>

          <section class="touch-section priority root-section">
            <div class="strip-top-action"><button id="mobileMinorBtn" class="minor-next-btn">Minor next</button></div>
            <div id="rootGrid" class="root-grid-mobile"></div>
          </section>

          <section class="touch-section priority bass-section">
            <div class="strip-top-action"><button id="slashBassBtn" class="mini">Clear bass</button></div>
            <div id="slashBassGrid" class="bass-grid-mobile"></div>
          </section>

          <section class="touch-section priority">
            <h2>Chord type / extension</h2>
            <div class="horizontal-menu-shell"><div id="extensionGrid" class="extension-grid"></div></div>
          </section>

          <details class="advanced" open>
            <summary>Alterations</summary>
            <div id="alterationGrid" class="alteration-strip"></div>
          </details>

          <details class="advanced">
            <summary>Omit / custom</summary>
            <div class="omit-strip"><button data-omit="no3">no3</button><button data-omit="no5">no5</button><button data-omit="no7">no7</button><button id="customSuffixBtn">Custom…</button></div>
            <label id="customSuffixWrap" class="field hidden"><span>Custom suffix</span><input id="customSuffix" type="text" placeholder="e.g. (add♭6)" /></label>
          </details>

          <details class="advanced">
            <summary>Base quality and display</summary>
            <div id="qualityGrid" class="quality-grid"></div>
            <div class="settings-row">
              <label>Style<select id="symbolStyle"><option value="readable">Readable</option><option value="symbols">Symbols</option><option value="compact">Compact</option></select></label>
              <label><input id="superscriptToggle" type="checkbox" /> Superscript</label>
              <label><input id="spaceAfterChordToggle" type="checkbox" checked /> Trailing space</label>
            </div>
          </details>
        </div>
      </aside>
    </main>
  </div>

  <button id="shortcutsBtn" hidden></button>
  <dialog id="shortcutsDialog"><form method="dialog"><button value="close">Close</button></form></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.error));
    }
    const drawer = document.getElementById('projectDrawer');
    document.getElementById('menuBtn').addEventListener('click', () => drawer.classList.toggle('hidden'));
  </script>
</body>
</html>
